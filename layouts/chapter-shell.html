<!doctype html>
<html lang="{{DOCUMENT_LANG}}">
<head>
<!--
  Security note:
  Browser-loaded CDN script and stylesheet assets are pinned with SRI and
  crossorigin="anonymous". Pyodide is loaded separately inside a Web Worker;
  see README.md for the importScripts() SRI limitation.
-->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{DOCUMENT_DESCRIPTION}}">
  <meta property="og:title" content="{{DOCUMENT_TITLE}}">
  <meta property="og:description" content="{{DOCUMENT_DESCRIPTION}}">
  <meta property="og:type" content="article">
  <meta property="og:site_name" content="{{SITE_TITLE}}">
  <title>{{DOCUMENT_TITLE}}</title>

  <!-- Library config -->
  <script>
    window.technicalDocDefaultLayoutMode = "{{DEFAULT_LAYOUT_MODE}}";

    try {
      const savedLayoutMode = window.localStorage ? window.localStorage.getItem("technicalDocLayoutMode") : null;
      const initialLayoutMode = savedLayoutMode || window.technicalDocDefaultLayoutMode;
      if (initialLayoutMode === "wide") {
        document.documentElement.classList.add("layout-wide");
      }
    } catch (error) {
      document.documentElement.classList.remove("layout-wide");
    }

    window.Prism = window.Prism || {};
    window.Prism.manual = true;

    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)']],
        displayMath: [['\\[', '\\]']],
        processEscapes: true
      },
      svg: {
        fontCache: 'global'
      }
    };
  </script>

  <!-- External libraries -->
{{FIXED_HEAD_ASSETS}}
{{OPTIONAL_HEAD_ASSETS}}

  <link rel="stylesheet" href="{{ASSET_PREFIX}}assets/css/technical-doc.css">
</head>

<body class="line-numbers document-page">
  <a class="skip-link" href="#main">Skip to main content</a>

  <div class="layout">
    <aside class="sidebar" aria-label="Document navigation">
      <header class="sidebar-header" aria-labelledby="sidebar-title">
        <h2 id="sidebar-title" class="sidebar-title">{{SIDEBAR_TITLE}}</h2>
        <p class="sidebar-subtitle">{{SIDEBAR_SUBTITLE}}</p>
      </header>

      <details class="nav-section" open>
        <summary>Contents</summary>
        <div class="nav-body">
          <ol class="nav-list site-contents-tree">
{{CONTENTS_TREE}}
          </ol>
        </div>
      </details>

      <details class="nav-section layout-mode-section" open>
        <summary>Layout</summary>
        <div class="nav-body">
          <fieldset class="layout-mode-control" aria-label="Layout width">
            <label>
              <input type="radio" name="layout-mode" value="standard" checked>
              <span>Standard</span>
            </label>
            <label>
              <input type="radio" name="layout-mode" value="wide">
              <span>Wide</span>
            </label>
          </fieldset>
        </div>
      </details>

{{MATERIALS_SECTION}}
{{EXTERNAL_LINKS_SECTION}}
    </aside>

    <main id="main" tabindex="-1">
      <article class="content">
{{CONTENT}}
      </article>
    </main>
  </div>

  <script defer src="{{ASSET_PREFIX}}assets/js/technical-doc.js"></script>
</body>
</html>
